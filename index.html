    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #f5f5f7;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #c7c7cc;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #a1a1a6;
      }

      /* Custom range input styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        border-radius: 3px;
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #0071e3;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
        box-shadow: 0 3px 10px rgba(0, 113, 227, 0.3);
      }

      input[type="range"]::-webkit-slider-thumb:active {
        transform: scale(0.95);
        background: #0071e3;
        border-color: #0071e3;
      }

      input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ffffff;
        border: 2px solid #0071e3;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      input[type="range"]::-moz-range-thumb:hover {
        transform: scale(1.1);
        box-shadow: 0 3px 10px rgba(0, 113, 227, 0.3);
      }

      /* Focus styles */
      input:focus, select:focus, button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.2);
      }

      /* Smooth transitions for all interactive elements */
      button, input, select, textarea {
        transition: all 0.2s ease;
      }

      /* Selection color */
      ::selection {
        background: rgba(0, 113, 227, 0.2);
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* Utility classes */
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }

      .slide-in {
        animation: slideIn 0.3s ease-out;
      }

      /* Critical above-the-fold CSS for Landing page LCP optimization */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Hero section skeleton to prevent CLS */
      #root {
        min-height: 100vh;
      }

      /* Landing page critical styles - prevents FOUC and improves LCP */
      .landing-hero-visual img {
        content-visibility: auto;
        contain-intrinsic-size: 900px 600px;
      }

      /* CLS Prevention: Global image and thumbnail styles */
      img {
        /* Prevent images from causing layout shifts before load */
        height: auto;
        max-width: 100%;
      }

      /* Dashboard card thumbnails - reserve space */
      .dashboard-grid img {
        aspect-ratio: 280 / 180;
        object-fit: cover;
      }

      /* Wizard screenshot grid - reserve space */
      .wizard-screenshots-grid > div {
        aspect-ratio: 9 / 19.5;
        min-height: 0;
      }
